<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スマホ行動認証ログ取得</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      padding: 15px;
      max-width: 600px;
      margin: 0 auto;
    }
    #targetArea {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px dashed #aaa;
      background-color: #f9f9f9;
      font-size: 16px;
      line-height: 1.5;
    }
    .participant-area {
      margin-bottom: 15px;
      padding: 10px;
      background-color: #eef7ff;
      border: 1px solid #bce0ff;
      border-radius: 5px;
    }
    .participant-area label {
      font-weight: bold;
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }
    .participant-area input {
      width: 100px;
      padding: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input[type="text"]#inputBox {
      width: 100%;
      font-size: 18px;
      padding: 8px;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .input-error {
      background-color: #ffcccc;
      border: 2px solid red;
      animation: shake 0.5s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    #inputComparison span.miss {
      color: red;
      font-weight: bold;
    }
    #inputComparison span.correct {
      color: green;
    }
    .btn-group {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background-color: #f0f0f0;
    }
    button#finishBtn {
      background-color: #28a745;
      color: white;
      border-color: #1e7e34;
      font-weight: bold;
    }
    button#finishBtn:disabled {
      background-color: #6c757d;
      border-color: #6c757d;
      cursor: not-allowed;
    }
    button#downloadBtn {
      background-color: #17a2b8;
      color: white;
      border-color: #117a8b;
    }
    #statusMessage {
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
    }
    #log {
      margin-top: 15px;
      border: 1px solid #ccc;
      padding: 10px;
      white-space: pre-wrap;
      height: 200px;
      overflow-y: auto;
      font-size: 12px;
      background-color: #fafafa;
    }
  </style>
</head>
