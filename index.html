<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スマホ行動認証ログ取得</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      padding: 15px;
      max-width: 600px;
      margin: 0 auto;
    }
    #targetArea {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px dashed #aaa;
      background-color: #f9f9f9;
      font-size: 16px;
      line-height: 1.5;
    }
    .participant-area {
      margin-bottom: 15px;
      padding: 10px;
      background-color: #eef7ff;
      border: 1px solid #bce0ff;
      border-radius: 5px;
    }
    .participant-area label {
      font-weight: bold;
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }
    .participant-area input {
      width: 100px;
      padding: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input[type="text"]#inputBox {
      width: 100%;
      font-size: 18px;
      padding: 8px;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .input-error {
      background-color: #ffcccc;
      border: 2px solid red;
      animation: shake 0.5s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    #inputComparison span.miss {
      color: red;
      font-weight: bold;
    }
    #inputComparison span.correct {
      color: green;
    }
    .btn-group {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background-color: #f0f0f0;
    }
    button#finishBtn {
      background-color: #28a745;
      color: white;
      border-color: #1e7e34;
      font-weight: bold;
    }
    button#finishBtn:disabled {
      background-color: #6c757d;
      border-color: #6c757d;
      cursor: not-allowed;
    }
    button#downloadBtn {
      background-color: #17a2b8;
      color: white;
      border-color: #117a8b;
    }
    #statusMessage {
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
    }
    #log {
      margin-top: 15px;
      border: 1px solid #ccc;
      padding: 10px;
      white-space: pre-wrap;
      height: 200px;
      overflow-y: auto;
      font-size: 12px;
      background-color: #fafafa;
    }
  </style>
</head>
<body>

  <h2>入力してください</h2>
 
  <div class="participant-area">
    <label for="participantId">参加者番号 (例: 01, A):</label>
    <input type="text" id="participantId" value="01" autocomplete="off">
  </div>

  <div id="targetArea">
    <p>お手本：<strong id="targetDisplay">大月先生は、長野県松本市出身である。生まれは、</strong></p>
    <p>あなたの入力：<span id="inputComparison"></span></p>
  </div>

  <input type="text" id="inputBox" autocomplete="off">
 
  <div class="btn-group">
    <button id="finishBtn">完了（自動送信）</button>
    <button id="downloadBtn">手動CSV保存</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="statusMessage"></div>

  <h3>入力ログ</h3>
  <div id="log"></div>

  <script>
    // 🔗 【設定完了】ご提示いただいたGoogle Apps ScriptのURLを組み込みました！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbznXh_knnPNF1z7Vx0lxn5nbhwjsuv2Wz4OhYlWKZLp8gQsuZ_eXeLr6lKGuWlquXUx/exec";

    // 要素の取得
    const inputBox = document.getElementById("inputBox");
    const finishBtn = document.getElementById("finishBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const logArea = document.getElementById("log");
    const targetDisplay = document.getElementById("targetDisplay");
    const inputComparisonArea = document.getElementById("inputComparison");
    const participantInput = document.getElementById("participantId");
    const statusMessage = document.getElementById("statusMessage");

    // 変数の定義
    let logs = [];
    let lastTouchEndTime = null;
    let touchStartTime = null;
    let startX = null;
    let startY = null;

    // PCキーボード用
    let lastValue = "";
    let keyTimes = {};
    let lastKeyUpTime = null;
    let lastKeyPressTime = null;
    let isComposing = false;
    let justConfirmed = false;

    const targetText = "大月先生は、長野県松本市出身である。生まれは、";

    // --- スマホ用：タッチ挙動ログ取得 ---
    inputBox.addEventListener("touchstart", (e) => {
      const t = e.touches[0];
      touchStartTime = performance.now();
      startX = t.clientX;
      startY = t.clientY;
    });

    inputBox.addEventListener("touchend", (e) => {
      const endTime = performance.now();
      const duration = endTime - touchStartTime;
     
      let interval = null;
      if (lastTouchEndTime !== null) {
        interval = endTime - lastTouchEndTime;
      }

      logs.push({
        "タイプ": "タッチ",
        "押されたキー": null,
        "変換中フラグ": null,
        "変更前テキスト": null,
        "変更後テキスト": null,
        "ミス": null,
        "キーホールド時間(ms)": Math.round(duration),
        "キー間移動時間(ms)": interval ? Math.round(interval) : null,
        "pressToPress(ms)": null,
        "time": Math.round(endTime)
      });

      lastTouchEndTime = endTime;
      updateLogDisplay();
    });


    // --- PCキーボード用：タイピング挙動ログ取得 ---

    // 1. IME（日本語入力）の制御
    inputBox.addEventListener("compositionstart", () => {
      isComposing = true;
      justConfirmed = false;
    });

    inputBox.addEventListener("compositionend", () => {
      isComposing = false;
      justConfirmed = true; // 漢字が確定された瞬間
      checkMissAndFeedback();
    });

    // 2. キーボードが押された瞬間（keydown）
    inputBox.addEventListener("keydown", (e) => {
      if (e.repeat) return;

      const now = performance.now();
      if (["Shift", "Control", "Alt", "Meta"].includes(e.key)) return;

      if (!keyTimes[e.code]) {
        keyTimes[e.code] = now;
      }

      // Press-to-Press (P-P) の計算
      let ppTime = null;
      if (lastKeyPressTime !== null) {
        ppTime = Math.round(now - lastKeyPressTime);
      }
      lastKeyPressTime = now;

      // Interval Time の計算
      let intervalTime = null;
      if (lastKeyUpTime !== null) {
        intervalTime = Math.round(now - lastKeyUpTime);
      }

      // 一時的にデータ属性に保存
      inputBox.dataset.latestInterval = intervalTime !== null ? intervalTime : "";
      inputBox.dataset.latestPP = ppTime !== null ? ppTime : "";

      if (!isComposing) {
        checkMissAndFeedback();
      }
    });

    // 3. キーボードが離された瞬間（keyup）
    inputBox.addEventListener("keyup", (e) => {
      const now = performance.now();
      if (["Shift", "Control", "Alt", "Meta"].includes(e.key)) return;

      const pressTime = keyTimes[e.code];
      if (!pressTime) return;

      const holdTime = Math.round(now - pressTime);

      const savedInterval = inputBox.dataset.latestInterval;
      const savedPP = inputBox.dataset.latestPP;
      const intervalTime = savedInterval !== "" ? parseInt(savedInterval, 10) : null;
      const ppTime = savedPP !== "" ? parseInt(savedPP, 10) : null;

      delete keyTimes[e.code];
      lastKeyUpTime = now;

      const currentInput = inputBox.value;
      let currentType = "入力";
      if (e.code === "Backspace") {
        currentType = "削除";
      }

      let isMiss = false;

      if (!isComposing) {
        if (justConfirmed || currentType === "削除" || e.code === "Enter") {
          if (currentInput.length > 0) {
            const targetSubstring = targetText.substring(0, currentInput.length);
            if (currentInput !== targetSubstring) {
              isMiss = true;
            }
          }
        }
      }

      // ログに追加
      logs.push({
        "タイプ": currentType,
        "押されたキー": e.code,
        "変換中フラグ": isComposing,
        "変更前テキスト": lastValue,
        "変更後テキスト": currentInput,
        "ミス": isMiss,
        "キーホールド時間(ms)": holdTime,
        "キー間移動時間(ms)": intervalTime,
        "pressToPress(ms)": ppTime,
        "time": Math.round(now)
      });

      lastValue = currentInput;
      justConfirmed = false;
      updateLogDisplay();
      if (!isComposing) {
        checkMissAndFeedback();
      }
    });


    // --- ミス判定と画面表示のフィードバック ---
    function checkMissAndFeedback() {
      const currentInput = inputBox.value;
      let html = "";
      let hasError = false;

      for (let i = 0; i < currentInput.length; i++) {
        if (i < targetText.length) {
          if (currentInput[i] === targetText[i]) {
            html += `<span class="correct">${currentInput[i]}</span>`;
          } else {
            html += `<span class="miss">${currentInput[i]}</span>`;
            hasError = true;
          }
        } else {
          html += `<span class="miss">${currentInput[i]}</span>`;
          hasError = true;
        }
      }

      inputComparisonArea.innerHTML = html;

      if (hasError) {
        inputBox.classList.add("input-error");
      } else {
        inputBox.classList.remove("input-error");
      }
    }

    // --- 画面下のログ表示エリアを更新 ---
    function updateLogDisplay() {
      logArea.textContent = logs.map((log, index) => {
        return `#${index + 1}\n` + JSON.stringify(log, null, 2);
      }).join("\n\n");
      logArea.scrollTop = logArea.scrollHeight;
    }

    // --- ボタン操作：リセット ---
    resetBtn.addEventListener("click", () => {
      inputBox.value = "";
      lastValue = "";
      logs = [];
      logArea.textContent = "";
      inputComparisonArea.innerHTML = "";
      inputBox.classList.remove("input-error");
      statusMessage.textContent = "データをリセットしました。";
      statusMessage.style.color = "black";
      finishBtn.disabled = false;
    });

    // --- ボタン操作：手動CSV保存（バックアップ用） ---
    downloadBtn.addEventListener("click", () => {
      if (logs.length === 0) {
        alert("ログデータがありません。");
        return;
      }
      const pId = participantInput.value || "unknown";
     
      // CSVのヘッダー
      let csvContent = "data:text/csv;charset=utf-8,参加者,番号,タイプ,押されたキー,変換中フラグ,変更前テキスト,変更後テキスト,ミス,キーホールド時間(ms),キー間移動時間(ms),pressToPress(ms),time\n";
     
      // ログデータをCSV行に変換
      logs.forEach((log, index) => {
        const row = [
          pId,
          index + 1,
          log["タイプ"],
          log["押されたキー"],
          log["変換中フラグ"],
          log["変更前テキスト"],
          log["変更後テキスト"],
          log["ミス"],
          log["キーホールド時間(ms)"],
          log["キー間移動時間(ms)"],
          log["pressToPress(ms)"],
          log["time"]
        ].map(val => (val === null || val === undefined) ? "" : `"${String(val).replace(/"/g, '""')}"`).join(",");
        csvContent += row + "\n";
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `typing_log_p${pId}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // --- ボタン操作：完了（Googleスプレッドシートへ自動送信） ---
    finishBtn.addEventListener("click", () => {
      if (logs.length === 0) {
        alert("送信するログデータがありません。入力を行ってください。");
        return;
      }

      finishBtn.disabled = true;
      statusMessage.textContent = "Googleスプレッドシートに送信中...";
      statusMessage.style.color = "blue";

      const pId = participantInput.value || "未指定";

      // GASに送るデータ構造を作成
      const payload = {
        participant: pId,
        logs: logs
      };

      // fetchを使ってGoogle Apps ScriptにデータをPOST送信
      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors", // クロスドメインエラーを回避する設定
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      })
      .then(() => {
        statusMessage.textContent = "スプレッドシートへの送信が完了しました！";
        statusMessage.style.color = "green";
        alert("送信完了しました！スプレッドシートを確認してください。");
      })
      .catch((error) => {
        console.error("Error:", error);
        statusMessage.textContent = "送信エラーが発生しました。手動CSV保存を試してください。";
        statusMessage.style.color = "red";
        finishBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
